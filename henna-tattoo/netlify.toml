# Netlify config — henna-tattoo-albania (Astro)
#
# `npm run build` triggers `prebuild` which runs the image optimizer.
# It is incremental (manifest-driven) so build minutes stay low.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "26"
  HUSKY        = "0"

# www → apex (one canonical host).
[[redirects]]
  from   = "https://www.hennatattooalbania.com/*"
  to     = "https://hennatattooalbania.com/:splat"
  status = 301
  force  = true

# ---------------------------------------------------------------
# Cache headers — biggest lever for the free-tier bandwidth budget.
# /images/* and /_astro/* are content-hashed or filename-versioned,
# so they're marked immutable for one year.
# ---------------------------------------------------------------

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Explicit MIME types — Netlify usually auto-detects but a missing
# variant returns the 404 HTML page, which network-tab tools then
# label as text/html. These headers make sure existing files always
# advertise the correct image type.
[[headers]]
  for = "/images/*.avif"
  [headers.values]
    Content-Type  = "image/avif"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*.webp"
  [headers.values]
    Content-Type  = "image/webp"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Self-hosted variable fonts (bundled by @fontsource through Vite)
[[headers]]
  for = "/_astro/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/og-cover.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/favicon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type  = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "text/plain; charset=utf-8"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json; charset=utf-8"

# Default headers for every response. HTML revalidates so site updates
# ship instantly; security headers harden the deploy.
#
# CSP allows: self for everything, inline JSON-LD + tiny IG-facade script,
# Tailwind/Astro inline styles, Google Maps embed (contact page), and the
# Instagram iframe loaded on click. Lighthouse "Strong CSP" is unscored,
# but a real CSP still hardens the surface area against XSS.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options       = "nosniff"
    X-Frame-Options              = "SAMEORIGIN"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security    = "max-age=63072000; includeSubDomains; preload"
    X-Robots-Tag                 = "index, follow, max-image-preview:large"
    Cross-Origin-Opener-Policy   = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.instagram.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.cdninstagram.com https://*.fbcdn.net; font-src 'self' data:; connect-src 'self' https://www.instagram.com https://*.cdninstagram.com; frame-src 'self' https://www.google.com https://www.instagram.com https://instagram.com; frame-ancestors 'none'; form-action 'self' https://wa.me; base-uri 'self'; upgrade-insecure-requests"

# HTML revalidation policy — the edge keeps a copy but checks freshness.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
